# config.conf - Configuration for linux-screen-autorotate
# Edit this file to match your hardware before running the script.

# Display name - run 'xrandr' to find your display name (e.g. eDP-1, LVDS-1)
DNAME=eDP-1

# Path to the sensor log file
LOG=/run/user/$(id -u)/sensor.log

# X display to use
DISPLAY=:0
